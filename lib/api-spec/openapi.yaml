openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Meal Market API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: listings
    description: Meal point listings
  - name: messages
    description: Messaging between users
  - name: transactions
    description: Transaction records
  - name: users
    description: User profiles
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings:
    get:
      operationId: getListings
      tags: [listings]
      summary: Get all active listings
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [newest, price_asc, price_desc, points_asc, points_desc]
      responses:
        "200":
          description: List of listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

    post:
      operationId: createListing
      tags: [listings]
      summary: Create a new listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingBody"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{id}:
    get:
      operationId: getListing
      tags: [listings]
      summary: Get a listing by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateListing
      tags: [listings]
      summary: Update a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListingBody"
      responses:
        "200":
          description: Updated listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteListing
      tags: [listings]
      summary: Delete a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/my:
    get:
      operationId: getMyListings
      tags: [listings]
      summary: Get current user's listings
      responses:
        "200":
          description: My listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/stats:
    get:
      operationId: getListingStats
      tags: [listings]
      summary: Get marketplace statistics
      responses:
        "200":
          description: Marketplace stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketStats"

  /messages:
    get:
      operationId: getConversations
      tags: [messages]
      summary: Get all conversations for current user
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /messages/{conversationId}:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /messages/start:
    post:
      operationId: startConversation
      tags: [messages]
      summary: Start a new conversation about a listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartConversationBody"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions:
    get:
      operationId: getTransactions
      tags: [transactions]
      summary: Get transaction history for current user
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Record a completed transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionBody"
      responses:
        "201":
          description: Transaction recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get a user's public profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    RegisterBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string
        school:
          type: string
      required:
        - email
        - password
        - name
        - school

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        school:
          type: string
        createdAt:
          type: string
      required:
        - id
        - email
        - name
        - school
        - createdAt

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        school:
          type: string
        listingCount:
          type: integer
        transactionCount:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - name
        - school
        - listingCount
        - transactionCount
        - createdAt

    Listing:
      type: object
      properties:
        id:
          type: integer
        sellerId:
          type: integer
        sellerName:
          type: string
        sellerSchool:
          type: string
        pointsAmount:
          type: integer
        pricePerPoint:
          type: number
        totalPrice:
          type: number
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, sold, cancelled]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - sellerId
        - sellerName
        - sellerSchool
        - pointsAmount
        - pricePerPoint
        - totalPrice
        - status
        - createdAt
        - updatedAt

    CreateListingBody:
      type: object
      properties:
        pointsAmount:
          type: integer
        pricePerPoint:
          type: number
        description:
          type: string
      required:
        - pointsAmount
        - pricePerPoint

    UpdateListingBody:
      type: object
      properties:
        pointsAmount:
          type: integer
        pricePerPoint:
          type: number
        description:
          type: string
        status:
          type: string
          enum: [active, sold, cancelled]

    MarketStats:
      type: object
      properties:
        totalActiveListings:
          type: integer
        totalPointsAvailable:
          type: integer
        avgPricePerPoint:
          type: number
        totalTransactions:
          type: integer
        totalSchools:
          type: integer
      required:
        - totalActiveListings
        - totalPointsAvailable
        - avgPricePerPoint
        - totalTransactions
        - totalSchools

    Conversation:
      type: object
      properties:
        id:
          type: integer
        listingId:
          type: integer
        listingPointsAmount:
          type: integer
        listingTotalPrice:
          type: number
        listingStatus:
          type: string
        buyerId:
          type: integer
        buyerName:
          type: string
        sellerId:
          type: integer
        sellerName:
          type: string
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
        unreadCount:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - listingId
        - listingPointsAmount
        - listingTotalPrice
        - listingStatus
        - buyerId
        - buyerName
        - sellerId
        - sellerName
        - unreadCount
        - createdAt

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderId:
          type: integer
        senderName:
          type: string
        content:
          type: string
        readAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - conversationId
        - senderId
        - senderName
        - content
        - createdAt

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    StartConversationBody:
      type: object
      properties:
        listingId:
          type: integer
        initialMessage:
          type: string
      required:
        - listingId
        - initialMessage

    Transaction:
      type: object
      properties:
        id:
          type: integer
        listingId:
          type: integer
        buyerId:
          type: integer
        buyerName:
          type: string
        sellerId:
          type: integer
        sellerName:
          type: string
        pointsAmount:
          type: integer
        totalPrice:
          type: number
        role:
          type: string
          enum: [buyer, seller]
        createdAt:
          type: string
      required:
        - id
        - listingId
        - buyerId
        - buyerName
        - sellerId
        - sellerName
        - pointsAmount
        - totalPrice
        - role
        - createdAt

    CreateTransactionBody:
      type: object
      properties:
        listingId:
          type: integer
        buyerId:
          type: integer
      required:
        - listingId
        - buyerId
